<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTA Test Case Visualizer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f2f5; --surface: #fff; --surface2: #eef0f4;
    --text: #1a1a2e; --text2: #555; --border: #d4d8dd;
    --sel-bg: #dce6f5; --sel-border: #569cd6;
    --vscode-blue: #094771; --vscode-hover: #2a2d2e;
    --nav: #2196F3; --input: #4CAF50; --click: #FF9800;
    --assert: #9C27B0; --textassert: #E91E63; --wait: #607D8B;
    --section: #00BCD4; --varop: #FF5722; --fileop: #795548;
    --cond: #FFC107;
  }
  .dark {
    --bg: #1e1e1e; --surface: #252526; --surface2: #2d2d2d;
    --text: #d4d4d4; --text2: #858585; --border: #3c3c3c;
    --sel-bg: #264f78; --sel-border: #569cd6;
    --vscode-blue: #094771;
  }
  body {
    font-family: 'Segoe UI', 'SF Pro Text', -apple-system, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    font-size: 15px; line-height: 1.5;
  }
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 10px;
    position: sticky; top: 0; z-index: 100;
    transition: transform .3s;
  }
  .header h1 { font-size: 16px; font-weight: 700; font-family: 'Cascadia Code','Fira Code','Consolas',monospace; letter-spacing: -.2px; }
  .header h1 span { color: var(--nav); }
  .header-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .btn {
    padding: 5px 14px; border: 1px solid var(--border); border-radius: 3px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    background: var(--surface); color: var(--text);
    transition: background .15s; display: inline-flex; align-items: center; gap: 5px;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: #0e639c; color: #fff; border-color: #0e639c; }
  .btn-primary:hover { background: #1177bb; }
  .theme-toggle { font-size: 16px; background: none; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; color: var(--text); padding: 4px 8px; }

  #topRowOuter { margin: 16px 24px; border: 2px solid #48494B; border-radius: 4px; padding: 12px; }
  .dark #topRowOuter { border-color: #48494B; }
  #topRow {
    display: flex; gap: 12px;
  }
  #dropZone {
    padding: 36px 24px; border: 2px dashed var(--border);
    text-align: center; cursor: pointer; background: var(--surface);
    border-radius: 4px; flex: 1;
    transition: padding .7s, border-width .7s;
  }
  #dropZone.dragover { border-color: var(--nav); background: rgba(33,150,243,0.06); }
#dropZone .icon { font-size: 36px; margin-bottom: 6px; transition: font-size .7s; }
#dropZone p { font-size: 14px; color: var(--text2); transition: font-size .7s; }
#dropZone .sub { font-size: 12px; color: var(--text2); margin-top: 4px; transition: font-size .7s; }
  .has-files #dropZone { padding: 14px 12px; }
  .has-files #dropZone .icon { font-size: 22px; margin-bottom: 2px; }
  .has-files #dropZone p { font-size: 12px; }
  .has-files #dropZone .sub { font-size: 11px; margin-top: 2px; }

  #fileList {
    flex: 0; max-width: 0; visibility: hidden; opacity: 0; overflow: hidden;
    background: var(--surface); border-radius: 3px;
    display: flex; flex-direction: column; gap: 4px; min-height: 72px;
    transition: flex .7s, max-width .7s, visibility .7s, opacity .7s, padding .7s, border-width .7s;
    padding: 0; border-width: 0;
  }
  .has-files #fileList {
    flex: 1; max-width: 500px; visibility: visible; opacity: 1;
    padding: 14px 10px; border: 2px solid var(--border); border-width: 2px;
  }
  #fileList .fl-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
  .file-badge {
    padding: 2px 8px; font-size: 12px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
    border: 1px solid #a0a6b0; border-radius: 3px;
    background: var(--bg);
  }
  .dark .file-badge { border-color: #505050; }
  .file-badge .close { cursor: pointer; opacity: .5; font-size: 14px; margin-left: auto; }
  .file-badge .close:hover { opacity: 1; }

  #statsBar {
    flex: 0; max-width: 0; visibility: hidden; opacity: 0; overflow: hidden;
    display: flex; flex-direction: column; gap: 6px;
    background: var(--surface); border-radius: 3px;
    transition: flex .7s, max-width .7s, visibility .7s, opacity .7s, padding .7s, border-width .7s;
    padding: 0; border-width: 0;
  }
  .has-files #statsBar {
    flex: 1; max-width: 500px; visibility: visible; opacity: 1;
    padding: 14px 10px; border: 2px solid var(--border); border-width: 2px;
  }
  .stat-card { font-size: 13px; }
  .stat-card .label { font-weight: 600; }
  .stat-card .num { font-weight: 400; margin-left: 4px; }

  #searchBox {
    margin: 30px 24px 45px; padding: 8px 12px; border: 2px solid #48494B;
    width: calc(100% - 48px); font-size: 14px; font-family: inherit;
    background: var(--surface); color: var(--text);
    outline: none; transition: border .15s; border-radius: 3px;
  }
  #searchBox:focus { border-color: var(--sel-border); }
  .dark #searchBox { border-color: #48494B; }

  #tcContainer { padding: 0 24px 32px; display: flex; flex-direction: column; gap: 4px; }

  .tc-card { border: 1px solid #48494B; background: var(--surface); }
  .dark .tc-card { border-color: #48494B; }
  .tc-card + .tc-card { border-top: none; }
  .tc-header {
    padding: 8px 14px; display: flex; align-items: center; gap: 10px;
    cursor: pointer; user-select: none;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    position: sticky; top: var(--header-h, 52px); z-index: 50;
  }
  .tc-header .arrow { transition: transform .2s; font-size: 11px; color: var(--text2); }
  .tc-header .arrow.open { transform: rotate(90deg); }
  .tc-header .tc-id {
    background: var(--nav); color: #fff; padding: 1px 8px; font-size: 11px;
    font-weight: 700; font-family: 'Cascadia Code','Consolas',monospace;
    white-space: nowrap;
  }
  .tc-header .tc-name { font-weight: 500; font-size: 14px; }
  .tc-header .step-count { font-size: 11px; color: var(--text2); margin-left: auto; font-family: 'Cascadia Code','Consolas',monospace; }
  .file-label { background: var(--fl-bg,#d4d8dd); padding: 1px 6px; border-radius: 2px; font-family: 'Cascadia Code','Consolas',monospace; font-size: 12px; }
  .dark .file-label { background: var(--fl-bg-dark,#3c3c3c); }

  .tc-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .2s ease; overflow: hidden; }
  .tc-body.open { grid-template-rows: 1fr; }
  .tc-body > .step-table-wrapper { overflow: auto; min-height: 0; }

  .step-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .step-table th {
    text-align: left; padding: 6px 14px; font-size: 11px;
    text-transform: uppercase; letter-spacing: .4px; color: var(--text2);
    background: #EEF0F4; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; font-weight: 600; white-space: nowrap;
  }
  .dark .step-table th { background: #2d2d2d; }
  .step-table td {
    padding: 5px 14px; font-size: 13px; border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .step-table tr { transition: background .1s; }
  .step-table tr:hover td { background: var(--surface2); }
  .dark .step-table tr:hover td { background: #2a2d2e; }
  .step-table tr.row-selected td { background: var(--sel-bg) !important; }
  .step-table tr.row-selected { border-left: 3px solid var(--sel-border); }
  .step-table tr.row-selected .step-num { color: var(--sel-border); font-weight: 800; }
  .step-table tr.row-selected-prev td { background: #e3eaf5; }
  .dark .step-table tr.row-selected-prev td { background: #1e3a5f; }
  .step-num {
    width: 36px; text-align: center; font-weight: 600; color: var(--text2);
    font-family: 'Cascadia Code','Consolas',monospace; font-size: 11px;
  }
  .raw-col {
    font-family: 'Cascadia Code','Consolas',monospace; font-size: 11.5px;
    color: var(--text2); max-width: 320px; min-width: 160px;
    word-break: break-all; white-space: pre-wrap;
  }
  .copy-chip {
    cursor: pointer; padding: 1px 5px; border-radius: 2px;
    transition: all .1s; word-break: break-all;
    font-family: 'Cascadia Code','Consolas',monospace; font-size: 12.5px;
    background: rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.06);
  }
  .copy-chip:hover { background: rgba(0,0,0,0.15); border-color: rgba(0,0,0,0.12); }
  .dark .copy-chip { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.06); }
  .dark .copy-chip:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.12); }
  .elem-group { display: inline-flex; flex-direction: column; gap: 2px; vertical-align: middle; }
  .step-row-error td { background: #f8d7da !important; }
  .dark .step-row-error td { background: #4a2020 !important; }
  .step-row-error .step-num { color: #dc3545; }

  .copy-chip.chip-hover {
    background: #b3d4fc !important; color: #000;
    box-shadow: 0 0 0 1px #569cd6;
  }
  .dark .copy-chip.chip-hover {
    background: #264f78 !important; color: #d4d4d4;
    box-shadow: 0 0 0 1px #569cd6;
  }
  .cond-indent { border-left: 5px solid var(--cond); background: rgba(255,193,7,0.03); }
  .cond-indent-2 { border-left-color: #FF9800; }
  .cond-indent-3 { border-left-color: #FF5722; }

  .action-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; font-size: 11px; font-weight: 700;
    white-space: nowrap; font-family: 'Segoe UI', sans-serif;
  }
  .b-nav { background: #5688b0; color: #fff; }
  .b-input { background: #5f8f5f; color: #fff; }
  .b-click { background: #c08a5c; color: #fff; }
  .b-assert { background: #8a6eb0; color: #fff; }
  .b-textassert { background: #b06a8a; color: #fff; }
  .b-wait { background: #6b828c; color: #fff; }
  .b-section { background: #5c99a8; color: #fff; }
  .b-varop { background: #b87a5a; color: #fff; }
  .b-fileop { background: #7a6b63; color: #fff; }
  .b-cond { background: #c9a84c; color: #fff; }

  .desc-box { font-size: 13px; line-height: 1.6; }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--text2); }
  .empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  #copyToast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #333; color: #eee; padding: 8px 18px; border-radius: 4px;
    font-size: 13px; font-family: 'Segoe UI', sans-serif;
    z-index: 9999; opacity: 0; pointer-events: none;
    transition: opacity .2s; white-space: nowrap;
  }
  #copyToast.show { opacity: 1; }
  .dark #copyToast { background: #555; color: #ddd; }

  @media (max-width: 900px) {
    #topRowOuter { margin: 12px 16px; padding: 8px; }
    .has-files #topRow { flex-wrap: wrap; }
    .has-files #dropZone { flex: 1 1 100%; }
    .has-files #fileList { flex: 1; max-width: none; }
    .has-files #statsBar { flex: 1; max-width: none; }
  }
  @media (max-width: 768px) {
    .header { padding: 10px 16px; } .header h1 { font-size: 14px; }
    #topRowOuter { margin: 8px 12px; padding: 6px; }
    #tcContainer { padding: 0 16px 24px; }
    #searchBox { margin: 0 16px 10px; width: calc(100% - 32px); }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>Selenium</span> Test Script Visualizer</h1>
  <div class="header-controls">
    <input type="file" id="fileInput" accept=".csv" multiple hidden>
    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">+ 載入 CSV</button>
    <button class="btn" onclick="toggleAllCards()">⊞ 全部收合</button>
    <button class="btn" onclick="clearAll()">清除</button>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="切換深色主題">🌙</button>
  </div>
</div>

<div id="topRowOuter">
<div id="topRow">
  <div id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📂</div>
    <p><strong>拖放 CSV 檔案</strong> 到這裡，或點擊選擇</p>
    <p class="sub">支援多檔同時載入</p>
  </div>
  <div id="fileList"><div class="fl-label">已開啟檔案</div></div>
  <div id="statsBar"><div class="stat-card"><span class="label">Test Cases:</span><span class="num">0</span></div><div class="stat-card"><span class="label">步驟總數:</span><span class="num">0</span></div><div class="stat-card"><span class="label">CSV 檔案:</span><span class="num">0</span></div></div>
</div>
</div>
<div id="searchArea" style="display:none">
  <input type="text" id="searchBox" placeholder="🔍 搜尋 Test Case 或步驟內容..." oninput="debounceRender()">
</div>

  <div id="copyToast"></div>
  <div id="tcContainer">
  <div class="empty-state">
    <div class="big-icon">📊</div>
    <p>載入 CSV 後 Test Case 將顯示在此</p>
  </div>
</div>

<script>
const ACTION_MAP = {
  'open':                      { cat:'nav',       icon:'🚀', label:'開啟',       color:'#2196F3', params:1 },
  'type':                      { cat:'input',     icon:'✏️',  label:'輸入',       color:'#4CAF50', params:2 },
  'click':                     { cat:'click',     icon:'👆',  label:'點擊',       color:'#FF9800', params:1 },
  'present':                   { cat:'assert',    icon:'✅',  label:'存在',       color:'#9C27B0', params:1 },
  'not_present':               { cat:'assert',    icon:'❌',  label:'不存在',     color:'#9C27B0', params:1 },
  'visible':                   { cat:'assert',    icon:'👁️',  label:'可見',       color:'#9C27B0', params:1 },
  'not_visible':               { cat:'assert',    icon:'👁️‍🗨️', label:'不可見',   color:'#9C27B0', params:1 },
  'pause':                     { cat:'wait',      icon:'⏳',  label:'等待',       color:'#607D8B', params:1 },
  'print':                     { cat:'section',   icon:'📌',  label:'輸出',       color:'#00BCD4', params:1 },
  'dropdown':                  { cat:'input',     icon:'📋',  label:'下拉選擇',   color:'#4CAF50', params:2 },
  'press':                     { cat:'input',     icon:'⌨️',  label:'按鍵',       color:'#4CAF50', params:2 },
  'assert_text':               { cat:'textassert',icon:'📝',  label:'驗證文字',   color:'#E91E63', params:2 },
  'assert_attribute_value':    { cat:'textassert',icon:'📝',  label:'驗證屬性值', color:'#E91E63', params:2 },
  'assert_class':              { cat:'textassert',icon:'📝',  label:'驗證 Class', color:'#E91E63', params:2 },
  'get_text':                  { cat:'varop',     icon:'📥',  label:'取得文字',   color:'#FF5722', params:2 },
  'get_attribute_value':       { cat:'varop',     icon:'📥',  label:'取得屬性值', color:'#FF5722', params:2 },
  'compare_eq':                { cat:'varop',     icon:'⚖️',  label:'比較相等',   color:'#FF5722', params:2 },
  'check_file_downloaded':     { cat:'fileop',    icon:'📎',  label:'確認下載',   color:'#795548', params:1 },
  'check_presence_to_continue':{ cat:'cond',      icon:'🔀',  label:'條件開始',   color:'#FFC107', params:2 },
  'end_check_presence_to_continue':{ cat:'cond',  icon:'🔚',  label:'條件結束',   color:'#FFC107', params:0 },
};

let allTestCases = [];

// ---------- CSV Parsing ----------
function parseCSV(text, fileName) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const cases = [];
  for (const line of lines) {
    try {
      const fields = splitCSVLine(line);
      if (fields.length < 2) continue;
      const tcName = fields[0].trim();
      if (!tcName) continue;
      const steps = parseSteps(fields);
      cases.push({ fileName, tcName, steps });
    } catch (e) {
      cases.push({ fileName, tcName: fields?.[0]?.trim() || 'PARSE_ERROR', steps: [{ action:'__error__', params:[e.message], info:{ cat:'unknown', icon:'⚠️', label:'解析錯誤' }, condDepth:0, rawSyntax:'' }] });
    }
  }
  return cases;
}

function splitCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuotes = !inQuotes; continue; }
    if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ''; continue; }
    current += ch;
  }
  result.push(current.trim());
  return result;
}

function parseSteps(fields) {
  const steps = [];
  const remaining = fields.slice(1);
  let i = 0;
  let condDepth = 0;
  let lastActionIdx = -1;
  while (i < remaining.length) {
    const val = remaining[i];
    if (ACTION_MAP[val]) {
      const info = ACTION_MAP[val];
      const n = info.params;
      let params = [];
      // Phase 1: look back within step boundary, skipping 'check'
      let lb = i - 1;
      while (params.length < n && lb > lastActionIdx) {
        if (remaining[lb] !== '' && remaining[lb] !== 'check') {
          params.unshift(remaining[lb]);
        }
        lb--;
      }
      // Phase 2: if still short, include 'check' values within boundary
      if (params.length < n) {
        params = [];
        lb = i - 1;
        while (params.length < n && lb > lastActionIdx) {
          if (remaining[lb] !== '') {
            params.unshift(remaining[lb]);
          }
          lb--;
        }
      }
      while (params.length < n) params.unshift('');
      while (params.length > 0 && params[params.length - 1] === '') params.pop();

      let depth;
      if (val === 'check_presence_to_continue') {
        depth = condDepth + 1;
        condDepth++;
      } else if (val === 'end_check_presence_to_continue') {
        depth = condDepth;
        condDepth = Math.max(0, condDepth - 1);
      } else {
        depth = condDepth;
      }

      steps.push({ action: val, params, info, condDepth: depth, rawSyntax: remaining.slice(lastActionIdx+1, i+1).join(', ') });
      lastActionIdx = i;
      i++;
    } else if (val && val !== 'check' && /^[a-z][a-z_0-9]+$/.test(val)) {
      steps.push({ action:'__error__', params:[`不支援的語法: ${val}`], info:{ cat:'unknown', icon:'⚠️', label:'不支援的語法' }, condDepth, rawSyntax: remaining.slice(lastActionIdx+1, i+1).join(', ') });
      lastActionIdx = i;
      i++;
    } else {
      i++;
    }
  }
  return steps;
}

// ---------- Action Category CSS class ----------
function catClass(cat) {
  const map = {
    'nav':'b-nav','input':'b-input','click':'b-click',
    'assert':'b-assert','textassert':'b-textassert','wait':'b-wait',
    'section':'b-section','varop':'b-varop','fileop':'b-fileop','cond':'b-cond'
  };
  return map[cat] || 'b-nav';
}

// ---------- chip: inline selectors/values with hover highlight & copy ----------
function chip(text) {
  const t = text || '';
  return `<span class="copy-chip" data-copy="${escAttr(t)}" title="按一下複製">${escHtml(t)}</span>`;
}
function escAttr(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let hoveredText = null;
function chipHoverStart(e) {
  try {
    const chip = e.target.closest('.copy-chip');
    if (!chip) return;
    const text = chip.dataset.copy;
    if (!text || text === hoveredText) return;
    hoveredText = text;
    document.querySelectorAll('.copy-chip').forEach(el => {
      el.classList.toggle('chip-hover', el.dataset.copy === text);
    });
  } catch (_) {}
}
function chipHoverEnd(e) {
  try {
    const chip = e.target.closest('.copy-chip');
    if (!chip) return;
    hoveredText = null;
    document.querySelectorAll('.copy-chip').forEach(el => el.classList.remove('chip-hover'));
  } catch (_) {}
}

function splitXPath(text) {
  if (!text || !text.startsWith('//')) return [text];
  const m = text.match(/\/\//g);
  if (!m || m.length <= 1) return [text];
  return text.split('//').filter(Boolean).map(p => '//' + p);
}
function displayElements(text) {
  if (!text) return chip('');
  const segs = splitXPath(text);
  if (segs.length <= 1) return chip(text);
  return `<span class="elem-group">${segs.map(s => chip(s)).join('')}</span>`;
}

function describeStep(step) {
  try {
    const { action, params } = step;
    const sel = params[0] || '';
    const val = params[1] || '';
    switch (action) {
    case 'open': return `開啟 ${displayElements(sel)}`;
    case 'type': return `在 ${displayElements(sel)} 輸入 ${chip(val)}`;
    case 'click': return `點擊 ${displayElements(sel)}`;
    case 'present': return `確認 ${displayElements(sel)} 存在`;
    case 'not_present': return `確認 ${displayElements(sel)} 不存在`;
    case 'visible': return `確認 ${displayElements(sel)} 可見`;
    case 'not_visible': return `確認 ${displayElements(sel)} 不可見`;
    case 'pause': return `等待 ${chip(sel)} 秒`;
    case 'print': return `${chip(sel)}`;
    case 'dropdown': return `在 ${displayElements(sel)} 選擇 ${chip(val)}`;
    case 'press': return `在 ${displayElements(sel)} 按下 ${chip(val)}`;
    case 'assert_text': return `確認 ${displayElements(sel)} 文字 = ${chip(val)}`;
    case 'assert_attribute_value': return `確認 ${displayElements(sel)} 屬性值 = ${chip(val)}`;
    case 'assert_class': return `確認 ${displayElements(sel)} class = ${chip(val)}`;
    case 'get_text': return `讀取 ${displayElements(sel)} 文字 → 存入 ${chip(val)}`;
    case 'get_attribute_value': return `讀取 ${displayElements(sel)} 屬性值 → 存入 ${chip(val)}`;
    case 'compare_eq': return `比較 ${chip(sel)} = ${chip(val)}`;
    case 'check_file_downloaded': return `確認 ${displayElements(sel)} 已下載`;
    case 'check_presence_to_continue': return `若 ${displayElements(sel)} 存在則繼續`;
    case 'end_check_presence_to_continue': return `條件區塊結束`;
    default: return action;
  }
  } catch (e) { return `⚠️ ${escHtml(e.message)}`; }
}

// ---------- Render ----------
function renderAll() {
  const container = document.getElementById('tcContainer');
  const searchTerm = document.getElementById('searchBox').value.toLowerCase().trim();

  if (allTestCases.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="big-icon">📊</div><p>載入 CSV 後 Test Case 將顯示在此</p></div>`;
    return;
  }

  const filtered = searchTerm
    ? allTestCases.filter(tc => {
        if (tc.tcName.toLowerCase().includes(searchTerm)) return true;
        return tc.steps.some(s => {
          const p = s.params.join(' ');
          const label = s.info.label;
          return (label + ' ' + p).toLowerCase().includes(searchTerm);
        });
      })
    : allTestCases;

  // Group by fileName
  const groups = {};
  for (const tc of filtered) {
    const key = tc.fileName;
    if (!groups[key]) groups[key] = [];
    groups[key].push(tc);
  }

  const fileColors = ['#f0cec0','#b8d4e8','#c8e0c0','#f0e0b0','#e0c8d0'];
  const fileColorsDark = ['#5a3830','#304860','#305038','#5a5030','#503040'];
  let html = '';
  let fileIdx = 0;
  for (const [fileName, tcs] of Object.entries(groups)) {
    if (fileIdx > 0) html += `<div style="height:16px"></div>`;
    const fc = fileColors[fileIdx % fileColors.length];
    const fcd = fileColorsDark[fileIdx % fileColorsDark.length];
    fileIdx++;
    const firstFile = fileIdx === 1;
    for (const tc of tcs) {
      const steps = tc.steps;
      html += `
      <div class="tc-card">
        <div class="tc-header" onclick="toggleCard(this)">
          <span class="arrow${firstFile ? ' open' : ''}">▶</span>
          <span class="file-label" style="--fl-bg:${fc};--fl-bg-dark:${fcd}">File: ${escHtml(fileName)}</span>
          <span style="color:var(--text2);font-size:13px">&gt; Test CASE name: ${escHtml(tc.tcName)}</span>
          <span class="step-count">${steps.length} 步驟</span>
        </div>
        <div class="tc-body${firstFile ? ' open' : ''}">
          <div class="step-table-wrapper"><table class="step-table">
            <thead><tr>
              <th class="step-num">#</th>
              <th>動作</th>
              <th>說明</th>
              <th class="raw-col">原始語法</th>
            </tr></thead>
            <tbody>
              ${steps.map((s, i) => { try { return renderStep(s, i + 1); } catch(e) { return `<tr class="step-row step-row-error"><td class="step-num">${i+1}</td><td><span class="action-badge" style="background:#dc3545;color:#fff">⚠️ 錯誤</span></td><td style="color:#dc3545">${escHtml(e.message)}</td><td class="raw-col">${escHtml(s.rawSyntax||'')}</td></tr>`; } }).join('')}
            </tbody>
          </table></div>
        </div>
      </div>`;
    }
  }

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><p>沒有符合「${escHtml(searchTerm)}」的 Test Case</p></div>`;
  } else {
    container.innerHTML = html;
  }
}

let selectedRow = null;
let debounceTimer = null;
function debounceRender() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderAll, 200);
}
const rowHistory = []; // max 3 previous selected rows

function renderStep(step, idx) {
  try {
    const { action, params, info, condDepth } = step;
    if (action === '__error__') {
      return `<tr class="step-row step-row-error">
        <td class="step-num">${idx}</td>
        <td><span class="action-badge" style="background:#dc3545;color:#fff">⚠️ 錯誤</span></td>
        <td class="desc-box" style="color:#dc3545">${escHtml(params[0]||'語法不支援')}</td>
        <td class="raw-col">${escHtml(step.rawSyntax||'')}</td>
      </tr>`;
    }
    const badgeClass = catClass(info.cat);
    const desc = describeStep(step);
    const condClass = condDepth ? ` cond-indent cond-indent-${Math.min(condDepth, 3)}` : '';

    return `<tr class="step-row${condClass}">
      <td class="step-num">${idx}</td>
      <td><span class="action-badge ${badgeClass}">${info.icon} ${info.label}</span></td>
      <td class="desc-box">${desc}</td>
      <td class="raw-col">${escHtml(step.rawSyntax||'')}</td>
    </tr>`;
  } catch (e) {
    return `<tr class="step-row step-row-error">
      <td class="step-num">${idx}</td>
      <td><span class="action-badge" style="background:#dc3545;color:#fff">⚠️ 渲染錯誤</span></td>
      <td class="desc-box" style="color:#dc3545">${escHtml(e.message)}</td>
      <td class="raw-col"></td>
    </tr>`;
  }
}

let toastTimer = null;
function copyText(text) {
  navigator.clipboard.writeText(text).catch(() => {});
  const t = document.getElementById('copyToast');
  if (!t) return;
  t.textContent = '✓ 已複製: ' + (text.length > 60 ? text.substring(0, 60) + '…' : text);
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function selectRow(el) {
  const stepNum = parseInt(el.querySelector('.step-num').textContent, 10);
  if (isNaN(stepNum)) return;
  if (el === selectedRow) return;

  // Clear all selections
  document.querySelectorAll('.row-selected, .row-selected-prev').forEach(r => {
    r.classList.remove('row-selected', 'row-selected-prev');
  });

  const tbody = el.closest('tbody');
  if (!tbody) { selectedRow = el; el.classList.add('row-selected'); return; }

  // Highlight clicked row + all preceding rows in same table
  const rows = tbody.querySelectorAll('.step-row');
  rows.forEach(row => {
    const num = parseInt(row.querySelector('.step-num').textContent, 10);
    if (!isNaN(num) && num <= stepNum) {
      row.classList.add(num === stepNum ? 'row-selected' : 'row-selected-prev');
    }
  });
  selectedRow = el;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function truncate(s, max) {
  if (!s || s.length <= max) return s || '';
  return s.substring(0, max) + '…';
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

let allExpanded = true;
function toggleAllCards() {
  allExpanded = !allExpanded;
  document.querySelectorAll('.tc-body').forEach(el => el.classList.toggle('open', allExpanded));
  document.querySelectorAll('.tc-header .arrow').forEach(el => el.classList.toggle('open', allExpanded));
  document.querySelectorAll('[onclick="toggleAllCards()"]').forEach(el => {
    el.textContent = allExpanded ? '⊞ 全部收合' : '⊟ 全部展開';
  });
}

// ---------- File handling ----------
document.getElementById('fileInput').addEventListener('change', function(e) {
  for (const file of e.target.files) handleFile(file);
  this.value = '';
});

document.getElementById('dropZone').addEventListener('dragover', function(e) {
  e.preventDefault(); this.classList.add('dragover');
});
document.getElementById('dropZone').addEventListener('dragleave', function(e) {
  this.classList.remove('dragover');
});
document.getElementById('dropZone').addEventListener('drop', function(e) {
  e.preventDefault(); this.classList.remove('dragover');
  for (const file of e.dataTransfer.files) {
    if (file.name.endsWith('.csv')) handleFile(file);
  }
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const cases = parseCSV(e.target.result, file.name);
    allTestCases.push(...cases);
    updateUI();
  };
  reader.readAsText(file);
}

function clearAll() {
  allTestCases = [];
  updateUI();
  document.getElementById('fileList').innerHTML = '';
}

function updateUI() {
  document.getElementById('topRowOuter').classList.toggle('has-files', allTestCases.length > 0);
  renderAll();
  updateStats();
  updateSearchBar();
  updateFileList();
}

function updateStats() {
  const bar = document.getElementById('statsBar');
  const totalTC = allTestCases.length;
  const totalSteps = allTestCases.reduce((s, tc) => s + tc.steps.length, 0);
  const files = [...new Set(allTestCases.map(tc => tc.fileName))];
  bar.innerHTML = `
    <div class="stat-card"><span class="label">Test Cases:</span><span class="num">${totalTC}</span></div>
    <div class="stat-card"><span class="label">步驟總數:</span><span class="num">${totalSteps}</span></div>
    <div class="stat-card"><span class="label">CSV 檔案:</span><span class="num">${files.length}</span></div>`;
}

function updateSearchBar() {
  const sa = document.getElementById('searchArea');
  sa.style.display = allTestCases.length > 0 ? 'block' : 'none';
}

function updateFileList() {
  const fl = document.getElementById('fileList');
  const files = [...new Set(allTestCases.map(tc => tc.fileName))];
  fl.innerHTML = '<div class="fl-label">已開啟檔案</div>';
  if (files.length === 0) {
    fl.innerHTML += '<div style="font-size:12px;color:var(--text2);padding:4px 0">無</div>';
    return;
  }
  const list = document.createElement('div');
  list.style.cssText = 'display:flex;flex-direction:column;gap:4px';
  for (const f of files) {
    const badge = document.createElement('div');
    badge.className = 'file-badge';
    badge.innerHTML = `📄 ${escHtml(f)} <span class="close">×</span>`;
    badge.querySelector('.close').onclick = () => removeFile(f);
    list.appendChild(badge);
  }
  fl.appendChild(list);
}

function removeFile(fileName) {
  allTestCases = allTestCases.filter(tc => tc.fileName !== fileName);
  updateUI();
}

// ---------- Event Delegation ----------
document.addEventListener('click', function(e) {
  const chip = e.target.closest('.copy-chip');
  if (chip) { copyText(chip.dataset.copy); return; }
  const row = e.target.closest('.step-row');
  if (row) { selectRow(row); return; }
});
document.addEventListener('mouseover', chipHoverStart);
document.addEventListener('mouseout', chipHoverEnd);

// ---------- Scroll hide header ----------
let lastScrollY = 0;
let headerHidden = false;
const pageHeader = document.querySelector('.header');
document.body.style.setProperty('--header-h', pageHeader.offsetHeight + 'px');
window.addEventListener('scroll', () => {
  const y = window.scrollY;
  const hh = pageHeader.offsetHeight;
  if (y > lastScrollY && y > hh && !headerHidden) {
    headerHidden = true;
    pageHeader.style.transform = 'translateY(-100%)';
    document.body.style.setProperty('--header-h', '0px');
  } else if (y < lastScrollY && headerHidden) {
    headerHidden = false;
    pageHeader.style.transform = 'translateY(0)';
    document.body.style.setProperty('--header-h', hh + 'px');
  }
  lastScrollY = y;
});

// ---------- Theme ----------
function toggleTheme() {
  document.body.classList.toggle('dark');
  const btn = document.getElementById('themeBtn');
  const isDark = document.body.classList.contains('dark');
  btn.textContent = isDark ? '☀️' : '🌙';
}
</script>
